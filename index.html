<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .search-box, .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #city-input {
            padding: 14px 22px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            width: 70%;
            max-width: 400px;
            outline: none;
        }

        .btn {
            padding: 14px 22px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .weather-card, .history-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .city-name {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .temperature {
            font-size: 65px;
            margin: 20px 0;
        }

        .weather-desc {
            font-size: 18px;
            text-transform: capitalize;
            margin-bottom: 25px;
        }

        .weather-details {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .detail-item {
            background: rgba(255,255,255,0.1);
            padding: 12px 25px;
            border-radius: 15px;
        }

        .forecast-title {
            color: white;
            text-align: center;
            margin: 30px 0 20px;
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .forecast-day {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .error-message {
            color: #ff6b6b;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .loading {
            color: white;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Weather App</h1>
        </div>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name">
            <button class="btn" id="search-btn">Get Weather</button>
            <button class="btn" id="location-btn">Use My Location</button>
        </div>

        <div class="action-buttons">
            <button class="btn" id="history-btn">View History</button>
            <button class="btn" id="export-btn">Export CSV</button>
        </div>

        <div id="weather-container">
            <div class="loading">Enter a city to start</div>
        </div>

        <div id="history-container" style="display: none;">
            <div class="history-card">
                <h3>Search History</h3>
                <div class="history-list" id="history-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "da2b4f3539d188e13b340b64ab009c35";

        const cityInput = document.getElementById("city-input");
        const searchBtn = document.getElementById("search-btn");
        const locationBtn = document.getElementById("location-btn");
        const historyBtn = document.getElementById("history-btn");
        const exportBtn = document.getElementById("export-btn");
        const weatherContainer = document.getElementById("weather-container");
        const historyContainer = document.getElementById("history-container");
        const historyList = document.getElementById("history-list");

        searchBtn.addEventListener("click", () => {
            const city = cityInput.value.trim();
            if (city) getWeather(city);
        });

        cityInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") getWeather(cityInput.value.trim());
        });

        locationBtn.addEventListener("click", getLocationWeather);
        historyBtn.addEventListener("click", toggleHistory);
        exportBtn.addEventListener("click", exportCSV);

        async function getWeather(city) {
            weatherContainer.innerHTML = "<div class='loading'>Loading...</div>";
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=en`;
                const res = await fetch(url);
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
                const fData = await fRes.json();

                showWeather(data, fData);
                saveHistory(city, data);
            } catch (err) {
                weatherContainer.innerHTML = `<div class='error-message'>${err.message}</div>`;
            }
        }

        function showWeather(data, forecast) {
            const days = forecast.list.filter((_, i) => i % 8 === 0);
            weatherContainer.innerHTML = `
                <div class="weather-card">
                    <div class="city-name">${data.name}, ${data.sys.country}</div>
                    <img src="https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png">
                    <div class="temperature">${Math.round(data.main.temp)}°C</div>
                    <div class="weather-desc">${data.weather[0].description}</div>
                    <div class="weather-details">
                        <div class="detail-item">Humidity ${data.main.humidity}%</div>
                        <div class="detail-item">Wind ${data.wind.speed} m/s</div>
                    </div>
                </div>
                <h3 class="forecast-title">5-Day Forecast</h3>
                <div class="forecast-container">
                    ${days.map(d => `
                        <div class="forecast-day">
                            <div>${new Date(d.dt_txt).toLocaleDateString()}</div>
                            <img src="https://openweathermap.org/img/wn/${d.weather[0].icon}.png">
                            <div>${Math.round(d.main.temp)}°C</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function getLocationWeather() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
                const data = await res.json();
                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
                const fData = await fRes.json();
                showWeather(data, fData);
                saveHistory(data.name, data);
            });
        }

        function saveHistory(city, data) {
            const hist = JSON.parse(localStorage.getItem("hist")) || [];
            hist.push({
                id: Date.now(),
                city,
                temp: data.main.temp,
                time: new Date().toLocaleString()
            });
            localStorage.setItem("hist", JSON.stringify(hist));
        }

        function toggleHistory() {
            historyContainer.style.display = historyContainer.style.display === "none" ? "block" : "none";
            renderHistory();
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem("hist")) || [];
            historyList.innerHTML = h.map(i => `
                <div class="history-item">
                    <div>${i.city} • ${i.temp.toFixed(1)}°C • ${i.time}</div>
                </div>
            `).join('');
        }

        function exportCSV() {
            const h = JSON.parse(localStorage.getItem("hist")) || [];
            let csv = "City,Temperature,Time\n";
            h.forEach(i => csv += `${i.city},${i.temp},${i.time}\n`);
            const blob = new Blob([csv], { type: "text/csv" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "weather.csv";
            a.click();
        }
    </script>
</body>
</html>
